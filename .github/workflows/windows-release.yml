name: Publish Windows Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Artifacts
    runs-on: windows-latest
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}\.zig-global-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vX.Y.Z. Received: $tag"
          }

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache/p
            .zig-global-cache
          key: ${{ runner.os }}-zig-0.15.2-${{ hashFiles('build.zig', 'build.zig.zon', 'pkg/**/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.15.2-

      - name: Fetch dependencies and build release
        shell: pwsh
        run: |
          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [Parameter(Mandatory = $true)][scriptblock]$Command,
              [int]$Attempts = 5
            )

            $exitCode = 1
            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              Write-Host "::group::$Name (attempt $attempt/$Attempts)"
              & $Command
              $exitCode = if ($null -ne $LASTEXITCODE) { $LASTEXITCODE } elseif ($?) { 0 } else { 1 }
              Write-Host "::endgroup::"

              if ($exitCode -eq 0) {
                return
              }

              if ($attempt -lt $Attempts) {
                $delay = [Math]::Min(120, 15 * $attempt)
                Write-Warning "$Name failed with exit code $exitCode. Retrying in $delay seconds..."
                Start-Sleep -Seconds $delay
              }
            }

            exit $exitCode
          }

          Invoke-WithRetry -Name "zig dependency fetch" -Command { zig build -Doptimize=ReleaseFast --fetch }
          Invoke-WithRetry -Name "windows packaging" -Command { powershell -ExecutionPolicy Bypass -File .\packaging\windows\package.ps1 -Version "${{ github.ref_name }}" }

      - name: Validate packaged outputs
        shell: pwsh
        run: |
          $portableExe = "zig-out\dist\portable\phantty.exe"
          $portableVersion = "zig-out\dist\portable\version.txt"
          $setupExe = "zig-out\dist\installer\phantty-setup.exe"

          if (!(Test-Path $portableExe)) {
            throw "Portable executable not found: $portableExe"
          }

          if (!(Test-Path $portableVersion)) {
            throw "Portable version file not found: $portableVersion"
          }

          if (!(Test-Path $setupExe)) {
            throw "Installer executable not found: $setupExe"
          }

      - name: Create release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $portableAsset = "phantty-windows-portable-$tag.zip"
          $setupAsset = "phantty-windows-setup-$tag.exe"

          if (Test-Path $portableAsset) {
            Remove-Item $portableAsset -Force
          }

          if (Test-Path $setupAsset) {
            Remove-Item $setupAsset -Force
          }

          Compress-Archive -Path zig-out\dist\portable\* -DestinationPath $portableAsset -Force
          Copy-Item zig-out\dist\installer\phantty-setup.exe $setupAsset -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantty-windows-portable-${{ github.ref_name }}
          path: phantty-windows-portable-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantty-windows-setup-${{ github.ref_name }}
          path: phantty-windows-setup-${{ github.ref_name }}.exe
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $portableAsset = "phantty-windows-portable-$tag.zip"
          $setupAsset = "phantty-windows-setup-$tag.exe"

          if (!(Test-Path $portableAsset)) {
            throw "Portable release asset not found: $portableAsset"
          }

          if (!(Test-Path $setupAsset)) {
            throw "Installer release asset not found: $setupAsset"
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $portableAsset $setupAsset --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag $portableAsset $setupAsset `
              --repo $env:GITHUB_REPOSITORY `
              --verify-tag `
              --generate-notes `
              --notes "Windows assets included in this release:

- Portable: zip archive containing phantty.exe
- Installer: setup executable that installs Phantty into the current user profile and adds a Start menu shortcut"
          }
