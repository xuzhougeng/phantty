name: Build Windows Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}\.zig-global-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache/p
            .zig-global-cache
          key: ${{ runner.os }}-zig-0.15.2-${{ hashFiles('build.zig', 'build.zig.zon', 'pkg/**/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.15.2-

      - name: Fetch dependencies and build release
        shell: pwsh
        run: |
          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [Parameter(Mandatory = $true)][scriptblock]$Command,
              [int]$Attempts = 5
            )

            $exitCode = 1
            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              Write-Host "::group::$Name (attempt $attempt/$Attempts)"
              & $Command
              $exitCode = if ($null -ne $LASTEXITCODE) { $LASTEXITCODE } elseif ($?) { 0 } else { 1 }
              Write-Host "::endgroup::"

              if ($exitCode -eq 0) {
                return
              }

              if ($attempt -lt $Attempts) {
                $delay = [Math]::Min(120, 15 * $attempt)
                Write-Warning "$Name failed with exit code $exitCode. Retrying in $delay seconds..."
                Start-Sleep -Seconds $delay
              }
            }

            exit $exitCode
          }

          Invoke-WithRetry -Name "zig dependency fetch" -Command { zig build -Doptimize=ReleaseFast --fetch }
          Invoke-WithRetry -Name "zig release build" -Command { zig build -Doptimize=ReleaseFast }

      - name: Package Windows artifact
        shell: pwsh
        run: |
          if (!(Test-Path zig-out\bin\phantty.exe)) {
            throw "Build output not found: zig-out\bin\phantty.exe"
          }

          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item zig-out\bin\phantty.exe dist\phantty.exe
          if (Test-Path zig-out\bin\phantty.pdb) {
            Copy-Item zig-out\bin\phantty.pdb dist\phantty.pdb
          }

          $zip = "phantty-windows-${{ github.ref_name }}.zip"
          Compress-Archive -Path dist\* -DestinationPath $zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantty-windows-${{ github.ref_name }}
          path: phantty-windows-${{ github.ref_name }}.zip
          if-no-files-found: error
